# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 10
command_timeout = 10000
add_newline = true
continuation_prompt = 'в–¶в–¶ '

# You can also replace your username with a neat symbol like п„   
# or disable this and use the os module below
[username]
show_always = true
style_user = "bold italic purple"

[battery]
disabled = true

[directory]
read_only = " пҖЈ "
truncation_length = 3
truncation_symbol = "вҖҰ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "пҖӯ "
"Downloads" = "пҖҷ "
"Games" = "п„ӣ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"nvim" = "оҹ… "

[git_commit]
tag_symbol = "пҗ’ "

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "none"
conflicted = 'п’Ң '
ahead = 'п“ҡ '
behind = 'п“ҷ '
diverged = 'пҗӯ \([п“ҡ $ahead_count](green)\|[п“ҷ $behind_count](red)\) '
up_to_date = '[п’Ө ](green)'
untracked = '[пҗ  ](yellow)'
stashed = '[пҗә ](blue)'
modified = '[пҗӣ ](orange)'
staged = '[п”Ғ $count ](green)'
renamed = '[п’Ј ](orange)'
deleted = '[п“ҙ $count ](red)'

